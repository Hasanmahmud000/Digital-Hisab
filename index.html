<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>এগ্রো ক্যালকুলেটর</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card { 
            background: rgba(30, 41, 59, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        input { outline: none !important; }
        .active-crop { transform: scale(1.05); border-width: 3px !important; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-ui { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <header class="p-5 flex justify-between items-center sticky top-0 z-50 bg-white/70 dark:bg-slate-950/70 backdrop-blur-xl">
        <div>
            <h1 class="text-2xl font-black text-emerald-600 dark:text-emerald-400">এগ্রো ক্যালকুলেটর</h1>
            <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Digital Farming Tool</p>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleDarkMode()" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border dark:border-slate-700">
                <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 pb-32">

        <div class="flex gap-3 overflow-x-auto no-scrollbar py-2">
            <div onclick="selectCrop('धान', '#10b981', this)" class="crop-btn active-crop flex-shrink-0 w-24 p-4 rounded-3xl glass-card text-center border-2 border-emerald-500">
                <i data-lucide="wheat" class="mx-auto mb-2 text-emerald-500"></i>
                <span class="text-sm font-bold">ধান</span>
            </div>
            <div onclick="selectCrop('চাল', '#f59e0b', this)" class="crop-btn flex-shrink-0 w-24 p-4 rounded-3xl glass-card text-center border-2 border-transparent">
                <i data-lucide="sprout" class="mx-auto mb-2 text-amber-500"></i>
                <span class="text-sm font-bold">চাল</span>
            </div>
            <div onclick="selectCrop('পাট', '#84cc16', this)" class="crop-btn flex-shrink-0 w-24 p-4 rounded-3xl glass-card text-center border-2 border-transparent">
                <i data-lucide="leaf" class="mx-auto mb-2 text-lime-500"></i>
                <span class="text-sm font-bold">পাট</span>
            </div>
            <div onclick="selectCrop('সরিষা', '#eab308', this)" class="crop-btn flex-shrink-0 w-24 p-4 rounded-3xl glass-card text-center border-2 border-transparent">
                <i data-lucide="layers" class="mx-auto mb-2 text-yellow-500"></i>
                <span class="text-sm font-bold">সরিষা</span>
            </div>
        </div>

        <div class="glass-card p-6 animate-ui space-y-5">
            <div class="flex items-center gap-2">
                <div id="crop-indicator" class="w-2 h-6 bg-emerald-500 rounded-full"></div>
                <h2 class="font-bold text-lg"><span id="selected-crop-name">ধান</span> হিসাব করুন</h2>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="relative">
                    <label class="text-xs font-bold opacity-50 mb-1 block ml-1">মণ</label>
                    <input type="number" id="mon-in" oninput="doCalc()" placeholder="০" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-900/50 text-xl font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
                </div>
                <div class="relative">
                    <label class="text-xs font-bold opacity-50 mb-1 block ml-1">কেজি</label>
                    <input type="number" id="kg-in" oninput="doCalc()" placeholder="০" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-900/50 text-xl font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
                </div>
            </div>

            <div class="relative">
                <label class="text-xs font-bold opacity-50 mb-1 block ml-1">মণ প্রতি দাম (টাকা)</label>
                <input type="number" id="rate-in" oninput="doCalc()" placeholder="ধরি ১০০০" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-900/50 text-xl font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
            </div>

            <div class="bg-emerald-500 text-white p-6 rounded-[2rem] shadow-lg shadow-emerald-500/20 space-y-3">
                <div class="flex justify-between items-center border-b border-white/20 pb-3">
                    <span class="text-sm font-medium opacity-90">মোট ওজন</span>
                    <span id="res-weight" class="text-xl font-bold">০ মণ ০ কেজি</span>
                </div>
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-xs opacity-80 block mb-1">মোট দাম</span>
                        <span id="res-price" class="text-3xl font-black">৳ ০.০০</span>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] opacity-80 block uppercase">১ কেজি দাম</span>
                        <span id="res-unit" class="font-bold">৳ ০.০</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 animate-ui" style="animation-delay: 0.1s;">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="package" class="w-5 h-5 text-blue-500"></i>
                <h2 class="font-bold text-lg">বস্তার হিসাব</h2>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="bag-count" oninput="calcBags()" placeholder="বস্তার সংখ্যা" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-900/50 font-bold border-none">
                <input type="number" id="bag-wt" oninput="calcBags()" placeholder="বস্তার ওজন" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-900/50 font-bold border-none">
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-4">
                <button onclick="setBag(40)" class="px-4 py-2 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 text-sm font-bold">৪০ কেজি</button>
                <button onclick="setBag(50)" class="px-4 py-2 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 text-sm font-bold">৫০ কেজি</button>
                <button onclick="setBag(60)" class="px-4 py-2 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 text-sm font-bold">৬০ কেজি</button>
                <button onclick="setBag(80)" class="px-4 py-2 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 text-sm font-bold">৮০ কেজি</button>
            </div>

            <div id="bag-summary" class="p-4 rounded-2xl bg-blue-50 dark:bg-blue-900/10 text-blue-600 dark:text-blue-400 text-center font-bold text-sm">
                বস্তার তথ্য দিলে এখানে ওজন যোগ হবে
            </div>
        </div>

    </main>

    <nav class="fixed bottom-6 left-4 right-4 h-20 glass-card flex items-center justify-around px-6 z-50 border border-white/50 shadow-2xl">
        <button class="text-emerald-500 flex flex-col items-center">
            <i data-lucide="layout-grid"></i>
            <span class="text-[10px] font-bold mt-1">হোম</span>
        </button>
        <button onclick="window.location.reload()" class="w-14 h-14 bg-emerald-500 rounded-full -mt-12 shadow-xl shadow-emerald-500/40 flex items-center justify-center text-white ring-8 ring-slate-50 dark:ring-slate-950">
            <i data-lucide="refresh-cw"></i>
        </button>
        <button class="text-slate-400 flex flex-col items-center">
            <i data-lucide="history"></i>
            <span class="text-[10px] font-bold mt-1">হিস্ট্রি</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            const isDark = document.documentElement.classList.contains('dark');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function selectCrop(name, color, el) {
            document.getElementById('selected-crop-name').innerText = name;
            document.getElementById('crop-indicator').style.backgroundColor = color;
            document.querySelectorAll('.crop-btn').forEach(b => b.classList.remove('active-crop', 'border-emerald-500'));
            el.classList.add('active-crop');
            el.style.borderColor = color;
            doCalc();
        }

        function doCalc() {
            const mon = parseFloat(document.getElementById('mon-in').value) || 0;
            const kg = parseFloat(document.getElementById('kg-in').value) || 0;
            const rate = parseFloat(document.getElementById('rate-in').value) || 0;

            let totalKg = (mon * 40) + kg;
            let resMon = Math.floor(totalKg / 40);
            let resKg = (totalKg % 40).toFixed(2);
            
            document.getElementById('res-weight').innerText = `${resMon} মণ ${resKg} কেজি`;

            let pricePerKg = rate / 40;
            let totalPrice = totalKg * pricePerKg;

            document.getElementById('res-unit').innerText = `৳ ${pricePerKg.toFixed(2)}`;
            document.getElementById('res-price').innerText = `৳ ${totalPrice.toLocaleString('bn-BD', {minimumFractionDigits: 2})}`;
        }

        function setBag(w) {
            document.getElementById('bag-wt').value = w;
            calcBags();
        }

        function calcBags() {
            const count = parseFloat(document.getElementById('bag-count').value) || 0;
            const wt = parseFloat(document.getElementById('bag-wt').value) || 0;
            let total = count * wt;
            let m = Math.floor(total / 40);
            let k = total % 40;
            
            document.getElementById('bag-summary').innerText = `মোট: ${total} কেজি (${m} মণ ${k} কেজি)`;
            
            // Sync with main inputs
            document.getElementById('mon-in').value = m;
            document.getElementById('kg-in').value = k;
            doCalc();
        }

        // SW Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
